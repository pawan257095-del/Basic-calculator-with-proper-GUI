<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator" aria-label="Simple calculator">
    <div class="display" role="status" aria-live="polite">
      <div class="previous-operand" id="previousOperand"></div>
      <div class="current-operand" id="currentOperand">0</div>
    </div>

    <div class="buttons">
      <button class="span-2" data-action="clear">AC</button>
      <button data-action="delete">DEL</button>
      <button data-action="operator" data-value="/">÷</button>

      <button data-number="7">7</button>
      <button data-number="8">8</button>
      <button data-number="9">9</button>
      <button data-action="operator" data-value="*">×</button>

      <button data-number="4">4</button>
      <button data-number="5">5</button>
      <button data-number="6">6</button>
      <button data-action="operator" data-value="-">−</button>

      <button data-number="1">1</button>
      <button data-number="2">2</button>
      <button data-number="3">3</button>
      <button data-action="operator" data-value="+">+</button>

      <button data-number="0" class="span-2">0</button>
      <button data-number=".">.</button>
      <button data-action="equals" class="equals">=</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
